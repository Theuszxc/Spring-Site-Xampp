<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="src/css/cadastro.css">
</head>

<body>

<header>
    <h1>Cadastro de Usuário</h1>
    <div class="nav-right" id="areaUsuario"></div>
</header>

<div class="container">
    <div class="card">

        <h2>Cadastro de Usuário</h2>

        <form id="formCadastro" enctype="multipart/form-data">

            <label>Nome</label>
            <input type="text" id="nome" name="nome" required>

            <label>Email</label>
            <input type="email" id="email" name="email" required>

            <label>Senha</label>
            <input type="password" id="senha" name="senha" required>

            <label>Foto de Perfil</label>
            <input type="file" id="fotoInput" name="foto" accept="image/*">

            <!-- Preview antes de enviar -->
            <img id="preview" src="" 
                 style="display:none; width:100px; margin-top:10px; border-radius:50%;">

            <!-- Foto cadastrada -->
            <img id="fotoUsuario" src="" 
                 style="display:none; width:100px; margin-top:10px; border-radius:50%;">

            <label>Perfil</label>
            <select id="perfil" name="perfil">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>

            <label>Endereço</label>
            <input type="text" id="endereco" name="endereco">

            <label>Bairro</label>
            <input type="text" id="bairro" name="bairro">

            <label>Complemento</label>
            <input type="text" id="complemento" name="complemento">

            <label>CEP</label>
            <input type="text" id="cep" name="cep">

            <label>Cidade</label>
            <input type="text" id="cidade" name="cidade">

            <label>Estado</label>
            <input type="text" id="estado" name="estado">

            <button type="submit">Salvar Usuário</button>

        </form>

        <br>

        <button onclick="voltar()">Voltar</button>

        <hr>

        <h2>Usuários Cadastrados</h2>

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Foto</th>
                </tr>
            </thead>
            <tbody id="listaUsuarios"></tbody>
        </table>

    </div>
</div>

<footer>
    © 2026 Sistema de Cadastro - Todos os direitos reservados
</footer>

<script src="src/js/cadastro.js"></script>
<script src="src/js/global.js"></script>

</body>
</html>

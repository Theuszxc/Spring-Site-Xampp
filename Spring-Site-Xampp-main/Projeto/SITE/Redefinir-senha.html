<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha</title>
    <link rel="stylesheet" href="src/css/Redefinir-senha.css"
</head>

<body>

<div class="container">

    <h2>Criar Nova Senha</h2>

    <p id="infoEmail" class="infoEmail"></p>

    <form id="redefinirForm">

        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="novaSenha" required minlength="4">
        </div>

        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="confirmarSenha" required>
        </div>

        <button type="submit">Atualizar Senha</button>

    </form>

    <div id="mensagem"></div>

</div>

<script src="src/js/Redefinir-senha.js"></script>

</body>
</html>
